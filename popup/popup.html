<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueuePilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <span class="logo-text">QueuePilot</span>
      </div>
    </div>
    <div class="header-right">
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Status Bar ── -->
  <div id="statusBar" class="status-bar status-idle">
    <div class="status-dot"></div>
    <span id="statusText">Monitoring</span>
    <span id="statusDetail" class="status-detail"></span>
  </div>

  <!-- ── Progress Bar (visible during queue processing) ── -->
  <div id="progressContainer" class="progress-container hidden">
    <div class="progress-info">
      <span id="progressLabel">Processing queue</span>
      <span id="progressCount">0/0</span>
    </div>
    <div class="progress-track">
      <div id="progressBar" class="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <!-- ── Add Prompt Form ── -->
  <div class="add-section">
    <textarea id="promptInput" placeholder="Type your prompt here... Queue it for when the limit resets." rows="3"></textarea>
    <div class="add-actions">
      <button id="addBtn" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add to Queue
      </button>
      <div class="add-meta">
        <span id="charCount">0</span> chars
      </div>
    </div>
  </div>

  <!-- ── Queue List ── -->
  <div class="queue-section">
    <div class="queue-header">
      <h2>
        Queue
        <span id="queueCount" class="badge">0</span>
      </h2>
      <div class="queue-actions">
        <button id="pauseBtn" class="icon-btn small" title="Pause Queue">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button id="clearBtn" class="icon-btn small danger" title="Clear All">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="queueList" class="queue-list">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/>
        </svg>
        <p>No prompts queued</p>
        <span>Add prompts above. They'll be submitted automatically when your limit resets.</span>
      </div>
    </div>
  </div>

  <!-- ── Settings Panel (hidden by default) ── -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="closeSettingsBtn" class="icon-btn small">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <label class="setting-row">
        <span>Auto submit when limit clears</span>
        <input type="checkbox" id="settingAutoSubmit" checked>
      </label>
      <label class="setting-row">
        <span>Notify on rate limit hit</span>
        <input type="checkbox" id="settingNotifyHit" checked>
      </label>
      <label class="setting-row">
        <span>Notify when limit clears</span>
        <input type="checkbox" id="settingNotifyClear" checked>
      </label>
      <label class="setting-row">
        <span>Notify when queue completes</span>
        <input type="checkbox" id="settingNotifyDone" checked>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
